- id: guideline-check
  name: Guideline Compliance Check
  description: Check project files against .github/instructions/ rules and generate an HTML report
  entry: guideline-checker
  language: python
  language_version: python3.12
  args: [check, --fail-on, warning]
  pass_filenames: false
  always_run: false
  stages: [pre-push, manual]
  additional_dependencies: []
