target-version = "py312"
line-length = 120

[lint]
select = [
    "E", "F", "W",  # pycodestyle, pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "ANN",  # flake8-annotations
    "S",    # bandit security
    "B",    # bugbear
    "C4",   # comprehensions
    "SIM",  # simplify
    "RUF",  # ruff-specific
    "PERF", # performance
]
ignore = [
    "S101",    # use of assert (for tests)
    "S603",    # subprocess without shell=True
    "S607",    # partial executable path
]

[lint.per-file-ignores]
"tests/**" = ["ANN", "S101"]

[format]
quote-style = "double"
indent-style = "space"
