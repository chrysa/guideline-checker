---
default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: f1dff44d3a9ae852957f34def96390f28719c232
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: debug-statements
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: c60c980e561ed3e73101667fe8365c609d19a438
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies: [types-pyyaml]
        stages: [manual]

  - repo: https://github.com/chrysa/pre-commit-tools
    rev: b97ae91d8a45eb6f556fe938fa8bd58294c9a5e6
    hooks:
      - id: python-print-detection
      - id: python-pprint-detection
      - id: python-unreachable-code
      - id: yaml-sorter
        exclude: ^\.github/workflows/
